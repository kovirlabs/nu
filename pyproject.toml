# uv-based dependency definition for the "nu" fork of the Mu editor.
#
# Dependencies below mirror setup.py's install_requires / extras_require so the
# uv workflow matches the original project. setup.py / setup.cfg remain the
# canonical packaging config used by the `make` targets and platform installers;
# `package = false` (under [tool.uv]) tells uv to manage the dependencies in the
# virtualenv without trying to build/install the project itself.
#
# The original supports Python >=3.5,<3.9. We pin to 3.8 (the newest supported
# interpreter, with usable wheels for the old pinned Qt stack). `uv sync` will
# download a managed CPython 3.8 automatically.
[project]
name = "nu"
version = "1.2.2"
description = "A simple Python editor for beginner programmers. A maintained continuation of the Mu editor."
requires-python = ">=3.8,<3.9"
dependencies = [
    # Qt stack — skipped on ARM, where these come from system packages
    # (matching the markers in setup.py).
    'PyQt5-sip<=12.13.0; "arm" not in platform_machine and "aarch" not in platform_machine',
    'PyQt5==5.13.2; "arm" not in platform_machine and "aarch" not in platform_machine',
    'QScintilla==2.11.3; "arm" not in platform_machine and "aarch" not in platform_machine',
    'PyQtChart==5.13.1; "arm" not in platform_machine and "aarch" not in platform_machine',
    "pyzmq<=26.0.3",
    "jupyter-client>=4.1,<6.2",
    "ipykernel>=4.1,<6",
    "ipython_genutils>=0.2.0",
    "qtconsole==4.7.7",
    # Serial port discovery / CircuitPython board identification.
    "adafruit-board-toolkit~=1.1",
    "pyserial~=3.5",
    "nudatus>=0.0.3",
    # flake8 brings pycodestyle + pyflakes, which are runtime dependencies.
    "flake8>=3.8.3",
    "click<=8.0.4",
    'black>=19.10b0,<22.1.0; python_version > "3.5"',
    "platformdirs>=2.0.0,<3.0.0",
    "semver>=2.8.0",
    "virtualenv>=20.0.0",
    "wheel",
    "requests>=2.0.0",
    "pywin32; sys_platform == 'win32'",
    # mu/resources imports pkg_resources at runtime. Modern venvs don't ship
    # setuptools by default, so declare it explicitly. TODO (Phase 2): migrate
    # pkg_resources -> importlib.resources and drop this.
    "setuptools",
]

[project.optional-dependencies]
tests = [
    "pytest>=4.6",
    "pytest-cov",
    "pytest-random-order>=1.0.0",
    "pytest-faulthandler",
    "pytest-timeout",
    "coverage",
]
docs = ["sphinx"]
package = ["wheel", "twine"]
i18n = ["babel"]
utils = ["scrapy", "beautifulsoup4", "requests"]
dev = ["nu[tests]", "nu[docs]", "nu[package]", "nu[i18n]"]
all = ["nu[tests]", "nu[docs]", "nu[package]", "nu[i18n]", "nu[utils]"]

[tool.uv]
package = false
