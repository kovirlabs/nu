name: Run tests

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'

# Minimal default token scope for all jobs (checkout + read only).
permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 30
    strategy:
      # Floor + ceiling of the supported range on every OS; the full sweep of
      # intermediate versions only on Linux (cheapest runner).
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.14']
        include:
          - os: ubuntu-latest
            python-version: '3.12'
          - os: ubuntu-latest
            python-version: '3.13'
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: Test Py ${{ matrix.python-version }} - ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Display Python info
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import platform, struct; print(platform.machine(), struct.calcsize('P') * 8)"
          python -m pip --version
      - name: Prepare Ubuntu
        if: runner.os == 'Linux'
        # Tests run under Qt's headless "offscreen" platform (QT_QPA_PLATFORM is
        # set on the check step), which needs only libEGL/libGL — no X server.
        # Constructing a QApplication under xvfb + the xcb platform plugin
        # aborts (SIGABRT) on the runners (Qt6 on Ubuntu noble), so we avoid the
        # xcb/xvfb stack entirely.
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1
      - name: Install Mu dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip list
        timeout-minutes: 10
      - name: Run checks
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: make check
        timeout-minutes: 10
      - name: Run checks
        if: runner.os != 'Linux'
        run: python make.py check
        timeout-minutes: 10
