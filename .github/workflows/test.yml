name: Run tests

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'

jobs:
  test:
    timeout-minutes: 30
    strategy:
      # Floor + ceiling of the supported range on every OS; the full sweep of
      # intermediate versions only on Linux (cheapest runner).
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.14']
        include:
          - os: ubuntu-latest
            python-version: '3.12'
          - os: ubuntu-latest
            python-version: '3.13'
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: Test Py ${{ matrix.python-version }} - ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Display Python info
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import platform, struct; print(platform.machine(), struct.calcsize('P') * 8)"
          python -m pip --version
      - name: Prepare Ubuntu
        if: runner.os == 'Linux'
        # Qt6's xcb platform plugin needs libxcb-cursor0 (since Qt 6.5) plus the
        # usual EGL/GL/xkb libraries; xvfb provides the virtual display.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-x11-0 libxcb-cursor0 libegl1 libgl1 xvfb
      - name: Install Mu dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip list
        timeout-minutes: 10
      - name: Run checks
        if: runner.os == 'Linux'
        run: xvfb-run make check
        timeout-minutes: 10
      - name: Run checks
        if: runner.os != 'Linux'
        run: python make.py check
        timeout-minutes: 10
