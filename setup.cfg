# Project lint+format config lives in pyproject.toml ([tool.ruff]); ruff
# replaced flake8 as the dev linter (Phase 1c). pycodestyle/pyflakes remain
# runtime deps — the in-editor checker in mu/logic.py uses their APIs directly
# and does not read any config from here.

[coverage:run]
omit = mu/contrib/*, mu/mu_debug.py, mu/__main__.py, mu/wheels/*

[tool:pytest]
filterwarnings = ignore::DeprecationWarning
addopts = --random-order
